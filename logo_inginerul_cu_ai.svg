<svg width="220" height="60" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Define Font -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&amp;display=swap');
      .logo-text-bold { font-family: 'Montserrat', sans-serif; font-weight: 800; }
      .logo-text-medium { font-family: 'Montserrat', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Logo Background (Badge) -->
  <rect x="5" y="9" width="42" height="42" fill="#000000" stroke="#FFB800" stroke-width="2.5" />
  <!-- Inner Border Line -->
  <rect x="9" y="13" width="34" height="34" fill="none" stroke="rgba(255, 184, 0, 0.3)" stroke-width="1" />
  
  <!-- "AI" inside Badge -->
  <text x="26" y="36" font-family="'Montserrat', sans-serif" font-weight="800" font-size="16" fill="#FFB800" text-anchor="middle">AI</text>

  <!-- Logo Text Section -->
  <text x="59" y="30" class="logo-text-bold" font-size="15" fill="#FFFFFF" letter-spacing="0.5">INGINERUL</text>
  <text x="59" y="46" class="logo-text-medium" font-size="13" fill="#FFB800" letter-spacing="1">CU AI</text>
</svg>
